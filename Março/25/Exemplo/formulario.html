<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <form id="id_formulario" name="formulario"> 
        <fieldset>
            <legend>
                Cadastro Simples
            </legend>

            <label for="id_nome">Nome:
                <input type="text"
                id="id_nome"
                class="campo_form"
                name="nome"
                placeholder="Informe o seu nome completo"
                minlength="5"
                maxlength="200"
                required>
            </label>

            <br>

            <label for="id_idade">Idade:
                <input 
                    type="number"
                    id="id_idade"
                    class="campo_form"
                    name="idade"
                    placeholder="Informe sua idade"
                    minlength="1"
                    maxlength="3"
                    required>
            </label>

            <div class="botoes_form">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>

        </fieldset>
    </form>

    <div id="id_resultado"></div>

    <script src="script.js"></script>
</body>
</html>
