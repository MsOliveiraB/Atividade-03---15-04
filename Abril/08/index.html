<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Cadastro</title>

    <style>
        #botao_cadastrar{
            background-color: rgb(26, 204, 26);
        }

        #botao_limpardados{
            background-color: red;
        }
    </style>
</head>
<body>
    <form id="id_formulario">
        <fieldset>
            <legend>Cadastro</legend>

            <label for="nome">Nome:
                <input 
                    type="text"
                    id="id_nome"
                    placeholder="Informe seu nome"
                    required
                >
            </label>
            <br>

            <label for="email">E-mail:
                <input 
                    type="email"
                    id="id_email"
                    placeholder="Informe seu e-mail"
                    required
                >
            </label>
            <br>

            <label for="idade">Idade:
                <input 
                    type="number"
                    id="id_idade"
                    placeholder="Informe sua idade"
                    required
                >
            </label>

            <fieldset id="genero">
                <legend>Radio - S:</legend>

                <label for="m">
                    <input 
                        type="radio"
                        name="radio_s"
                        id="m"
                        value="Masculino"
                        >M
                </label>

                <label for="f">
                    <input 
                        type="radio"
                        name="radio_s"
                        id="f"
                        value="Feminino"
                        >F
                </label>

            </fieldset>

            <fieldset>
                <legend id="tecnoogias">Checkbox - Tecnologias:</legend>
                <label for="java">
                    <input 
                        type="checkbox"
                        name="checkbox_tech"
                        value="Java"
                        id="id_java"
                    >Java
                </label>

                <label for="js">
                    <input 
                        type="checkbox"
                        name="checkbox_tech"
                        value="Javascript"
                        id="id_js"
                    >JS
                </label>

                <label for="python">
                    <input 
                        type="checkbox"
                        name="checkbox_tech"
                        value="Python"
                        id="id_python"
                    >Python
                </label>
            </fieldset>

            <button type="submit" id="botao_cadastrar">Cadastrar</button>
            <button type="reset" id="botao_limpardados">Limpar dados</button>
        
        </fieldset>
    </form>

    <script src="script.js"></script>
</body>
</html>
